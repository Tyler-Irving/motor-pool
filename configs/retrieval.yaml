# Hybrid retrieval configuration (Phase 2).
embedder_id: "BAAI/bge-base-en-v1.5"
query_prefix: "Represent this sentence for searching relevant passages: "
doc_prefix: ""
normalize: true
vector_backend: "numpy"
rrf:
  k: 60
  top_n: 50       # per-retriever fan-out before fusion
  top_k: 8        # chunks returned
  lexical_weight: 1.0
  dense_weight: 1.0
